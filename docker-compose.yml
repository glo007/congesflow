services:
  db:
    image: postgres:16-alpine
    container_name: congesflow_db
    environment:
      POSTGRES_USER: congesflow
      POSTGRES_PASSWORD: congesflow
      POSTGRES_DB: congesflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U congesflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: congesflow_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://congesflow:congesflow@db:5432/congesflow
      JWT_SECRET: change-me-in-prod
      JWT_EXPIRE_MINUTES: "120"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/code

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: congesflow_front
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
